<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon – Kabinet Selaras</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Spectral:wght@300;400&display=swap" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background-image: url('assets/images/Image(1).png');
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }



    .content {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 680px;
      width: 100%;
      padding: 0 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }

    .brand-name {
      font-family: 'Spectral', serif;
      font-weight: 400;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: #d4cfc8;
      text-align: left;
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: #6b665e;
      margin-top: 3px;
      text-align: left;
    }

    .heading-coming {
      font-size: clamp(3.2rem, 9vw, 6rem);
      font-weight: 800;
      line-height: 1;
      color: #e8e2d8;
      letter-spacing: -0.01em;
    }

    .heading-soon {
      font-size: clamp(3.2rem, 9vw, 6rem);
      font-weight: 800;
      line-height: 1;
      color: #e8a020;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }

    .ornament-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 10px 0 16px;
    }

    .orn-line {
      width: 90px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,160,64,0.4), #c8a040);
    }

    .orn-line.reverse {
      background: linear-gradient(to left, transparent, rgba(200,160,64,0.4), #c8a040);
    }

    .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: #9e9890;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .countdown {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      padding: 20px 0;
      margin-bottom: 36px;
    }

    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 36px;
    }

    .cd-number {
      font-size: 3rem;
      font-weight: 600;
      color: #ddd8ce;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .cd-label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #6b665e;
      margin-top: 10px;
    }

    .cd-divider {
      width: 1px;
      height: 56px;
      background: rgba(255,255,255,0.13);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #0a1929;
      border: 1.5px solid rgba(255,255,255,0.13);
      border-radius: 9999px;
      padding: 11px 28px;
      text-decoration: none;
      transition: all 0.2s ease;
      color: #ffffff;
    }

    .btn-back:hover {
      background: #001f3f;
      border-color: rgba(255,255,255,0.22);
    }


  </style>
</head>
<body>

<div class="page">
  <div class="content">
    <div class="brand">
      <img src="assets/images/image 5.png" alt="Logo Kabinet Selaras" onerror="this.style.display='none'" />
      <div>
        <p class="brand-name">KABINET SELARAS</p>
        <p class="brand-sub">HIMTIKA 2025-2026</p>
      </div>
    </div>

    <p class="heading-coming">COMING</p>
    <p class="heading-soon">SOON</p>

    <div class="ornament-row">
      <div class="orn-line"></div>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 5px rgba(200,160,40,.45))">
        <circle cx="10" cy="10" r="3" fill="#c8a040"/>
        <path d="M10 1.5 L11 7.5 L10 10 L9 7.5Z" fill="#c8a040" opacity="0.75"/>
        <path d="M10 18.5 L11 12.5 L10 10 L9 12.5Z" fill="#c8a040" opacity="0.75"/>
        <path d="M1.5 10 L7.5 9 L10 10 L7.5 11Z" fill="#c8a040" opacity="0.75"/>
        <path d="M18.5 10 L12.5 9 L10 10 L12.5 11Z" fill="#c8a040" opacity="0.75"/>
      </svg>
      <div class="orn-line reverse"></div>
    </div>

    <p class="subtitle">
      Event yang luar biasa<br/>akan segera dimulai..
    </p>

    <div class="countdown">
      <div class="cd-block">
        <span class="cd-number" id="days">12</span>
        <span class="cd-label">HARI</span>
      </div>
      <div class="cd-divider"></div>
      <div class="cd-block">
        <span class="cd-number" id="hours">08</span>
        <span class="cd-label">JAM</span>
      </div>
      <div class="cd-divider"></div>
      <div class="cd-block">
        <span class="cd-number" id="minutes">45</span>
        <span class="cd-label">MENIT</span>
      </div>
      <div class="cd-divider"></div>
      <div class="cd-block">
        <span class="cd-number" id="seconds">30</span>
        <span class="cd-label">DETIK</span>
      </div>
    </div>

    <a href="/" class="btn-back">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 8.5L10 2.5L17.5 8.5V17.5H13V12.5H7V17.5H2.5V8.5Z" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      <span style="font-size:13px; font-weight:400; letter-spacing:0.16em; color:#ffffff;">KEMBALI KE BERANDA</span>
    </a>
  </div>
</div>

<script>
  const target = new Date(Date.now() + (12 * 86400 + 8 * 3600 + 45 * 60 + 30) * 1000);

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = Math.max(0, target - Date.now());
    document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
    document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
